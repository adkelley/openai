name = "openai_gleam"
version = "0.5.0"

# Fill out these fields if you intend to generate HTML documentation or publish
# your project to the Hex package manager.
#
description = "Gleam SDK for the OpenAI API with typed Responses, Chat Completions, Audio, Files, and Embeddings clients."
licences = ["Apache-2.0"]
repository = { type = "github", user = "adkelley", repo = "openai_gleam" }
links = [
  { title = "GitHub", href = "https://github.com/adkelley/openai_gleam" },
  { title = "HexDocs", href = "https://hexdocs.pm/openai_gleam/" },
]
#
# For a full reference of all the available options, you can have a look at
# https://gleam.run/writing-gleam/gleam-toml/.

[dependencies]
gleam_stdlib = ">= 0.44.0 and < 2.0.0"
envoy = ">= 1.0.2 and < 2.0.0"
gleam_json = ">= 3.1.0 and < 4.0.0"
gleam_http = ">= 4.1.1 and < 5.0.0"
gleam_httpc = { git = "https://github.com/adkelley/httpc", ref = "main" }
gleam_erlang = ">= 1.3.0 and < 2.0.0"
simplifile = ">= 2.3.0 and < 3.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
